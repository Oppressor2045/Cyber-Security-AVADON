<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 420" width="780" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="entryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5e"/>
      <stop offset="100%" stop-color="#152840"/>
    </linearGradient>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a4a30"/>
      <stop offset="100%" stop-color="#112e1e"/>
    </linearGradient>
    <linearGradient id="testGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a3010"/>
      <stop offset="100%" stop-color="#301e08"/>
    </linearGradient>
    <linearGradient id="buildGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a3a"/>
      <stop offset="100%" stop-color="#1a1a28"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect width="780" height="420"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="780" height="420" fill="url(#bg)"/>

    <!-- TITLE -->
    <text x="390" y="36" font-family="monospace" font-size="15" font-weight="bold"
          fill="#d8eeff" text-anchor="middle" letter-spacing="6">PROJECT STRUCTURE</text>
    <line x1="40" y1="46" x2="740" y2="46" stroke="#1e3a55" stroke-width="1"/>

    <!-- ── include/ COLUMN ─────────────────────── -->
    <rect x="40" y="62" width="170" height="262" rx="6"
          fill="url(#entryGrad)" stroke="#3366cc" stroke-width="1.5"/>
    <!-- folder icon + label -->
    <text x="56" y="84" font-family="monospace" font-size="9" fill="#3366cc">📁</text>
    <text x="74" y="84" font-family="monospace" font-size="11" font-weight="bold"
          fill="#88bbff">include/</text>
    <line x1="50" y1="91" x2="200" y2="91" stroke="#2244aa" stroke-width="0.8"/>

    <!-- file rows -->
    <g font-family="monospace" font-size="9.5" fill="#5588cc">
      <!-- scanner.hpp -->
      <text x="60" y="114">📄 scanner.hpp</text>
      <text x="60" y="126" font-size="8" fill="#3a5580">  structs · Scanner class</text>
      <line x1="50" y1="133" x2="200" y2="133" stroke="#1a3355" stroke-width="0.5"/>
      <!-- argparser.hpp -->
      <text x="60" y="151">📄 argparser.hpp</text>
      <text x="60" y="163" font-size="8" fill="#3a5580">  CLI flags parser</text>
      <line x1="50" y1="170" x2="200" y2="170" stroke="#1a3355" stroke-width="0.5"/>
      <!-- logger.hpp -->
      <text x="60" y="188">📄 logger.hpp</text>
      <text x="60" y="200" font-size="8" fill="#3a5580">  INFO/WARN/ERROR/DEBUG</text>
      <line x1="50" y1="207" x2="200" y2="207" stroke="#1a3355" stroke-width="0.5"/>
      <!-- banner.hpp -->
      <text x="60" y="225">📄 banner.hpp</text>
      <text x="60" y="237" font-size="8" fill="#3a5580">  ASCII art + version</text>
    </g>

    <!-- file count badge -->
    <rect x="82" y="296" width="86" height="18" rx="3"
          fill="rgba(20,40,90,0.8)" stroke="#2244aa" stroke-width="0.8"/>
    <text x="125" y="309" font-family="monospace" font-size="8"
          fill="#4488cc" text-anchor="middle">4 header files</text>

    <!-- ── src/ COLUMN ────────────────────────── -->
    <rect x="228" y="62" width="170" height="186" rx="6"
          fill="url(#entryGrad)" stroke="#3366cc" stroke-width="1.5"/>
    <text x="244" y="84" font-family="monospace" font-size="9" fill="#3366cc">📁</text>
    <text x="262" y="84" font-family="monospace" font-size="11" font-weight="bold"
          fill="#88bbff">src/</text>
    <line x1="238" y1="91" x2="388" y2="91" stroke="#2244aa" stroke-width="0.8"/>

    <g font-family="monospace" font-size="9.5" fill="#5588cc">
      <text x="248" y="114">📄 main.cpp</text>
      <text x="248" y="126" font-size="8" fill="#3a5580">  entry · signal handler</text>
      <text x="248" y="138" font-size="8" fill="#3a5580">  ScanConfig · run()</text>
      <line x1="238" y1="145" x2="388" y2="145" stroke="#1a3355" stroke-width="0.5"/>
      <text x="248" y="163">📄 scanner.cpp</text>
      <text x="248" y="175" font-size="8" fill="#3a5580">  TCP/UDP scan engine</text>
      <text x="248" y="187" font-size="8" fill="#3a5580">  banner · DNS · export</text>
      <text x="248" y="199" font-size="8" fill="#3a5580">  thread pool (std::async)</text>
    </g>

    <rect x="264" y="220" width="86" height="18" rx="3"
          fill="rgba(20,40,90,0.8)" stroke="#2244aa" stroke-width="0.8"/>
    <text x="307" y="233" font-family="monospace" font-size="8"
          fill="#4488cc" text-anchor="middle">2 source files</text>

    <!-- ── tests/ COLUMN ──────────────────────── -->
    <rect x="416" y="62" width="170" height="262" rx="6"
          fill="url(#testGrad)" stroke="#aa6633" stroke-width="1.5"/>
    <text x="432" y="84" font-family="monospace" font-size="9" fill="#cc8844">📁</text>
    <text x="450" y="84" font-family="monospace" font-size="11" font-weight="bold"
          fill="#ffaa55">tests/</text>
    <line x1="426" y1="91" x2="576" y2="91" stroke="#664422" stroke-width="0.8"/>

    <g font-family="monospace" font-size="9.5" fill="#cc8844">
      <text x="436" y="114">📄 test_framework.hpp</text>
      <text x="436" y="126" font-size="8" fill="#7a5522">  ASSERT macros · runner</text>
      <line x1="426" y1="133" x2="576" y2="133" stroke="#442200" stroke-width="0.5"/>
      <text x="436" y="151">📄 test_argparser.cpp</text>
      <text x="436" y="163" font-size="8" fill="#7a5522">  9 test cases</text>
      <line x1="426" y1="170" x2="576" y2="170" stroke="#442200" stroke-width="0.5"/>
      <text x="436" y="188">📄 test_scanner.cpp</text>
      <text x="436" y="200" font-size="8" fill="#7a5522">  14 test cases</text>
      <line x1="426" y1="207" x2="576" y2="207" stroke="#442200" stroke-width="0.5"/>
      <text x="436" y="225">📄 test_main.cpp</text>
      <text x="436" y="237" font-size="8" fill="#7a5522">  REGISTER · run_all</text>
    </g>

    <!-- pass badge -->
    <rect x="446" y="278" width="108" height="18" rx="3"
          fill="rgba(10,50,10,0.8)" stroke="#338833" stroke-width="1"/>
    <text x="500" y="291" font-family="monospace" font-size="8"
          fill="#66dd44" text-anchor="middle">23 PASS · 0 FAIL</text>
    <rect x="446" y="300" width="108" height="14" rx="3"
          fill="rgba(40,20,5,0.8)" stroke="#664422" stroke-width="0.8"/>
    <text x="500" y="311" font-family="monospace" font-size="7.5"
          fill="#cc8844" text-anchor="middle">4 source files</text>

    <!-- ── ROOT FILES COLUMN ───────────────────── -->
    <rect x="604" y="62" width="136" height="262" rx="6"
          fill="url(#buildGrad)" stroke="#445566" stroke-width="1.5"/>
    <text x="620" y="84" font-family="monospace" font-size="9" fill="#6688aa">📁</text>
    <text x="638" y="84" font-family="monospace" font-size="11" font-weight="bold"
          fill="#aabbcc">root/</text>
    <line x1="614" y1="91" x2="730" y2="91" stroke="#334455" stroke-width="0.8"/>

    <g font-family="monospace" font-size="9.5" fill="#6688aa">
      <text x="624" y="114">📄 CMakeLists.txt</text>
      <text x="624" y="126" font-size="8" fill="#445566">  C++17 · Release</text>
      <text x="624" y="138" font-size="8" fill="#445566">  Threads · install</text>
      <line x1="614" y1="145" x2="730" y2="145" stroke="#2a3a4a" stroke-width="0.5"/>
      <text x="624" y="163">📄 README.md</text>
      <text x="624" y="175" font-size="8" fill="#445566">  docs · usage</text>
      <text x="624" y="187" font-size="8" fill="#445566">  examples · badges</text>
      <line x1="614" y1="194" x2="730" y2="194" stroke="#2a3a4a" stroke-width="0.5"/>
      <text x="624" y="212">📄 LICENSE</text>
      <text x="624" y="224" font-size="8" fill="#445566">  MIT · 2025</text>
      <line x1="614" y1="231" x2="730" y2="231" stroke="#2a3a4a" stroke-width="0.5"/>
      <text x="624" y="249">📄 architecture.svg</text>
      <text x="624" y="261" font-size="8" fill="#445566">  project diagram</text>
    </g>

    <rect x="624" y="296" width="96" height="18" rx="3"
          fill="rgba(20,30,50,0.8)" stroke="#334466" stroke-width="0.8"/>
    <text x="672" y="309" font-family="monospace" font-size="8"
          fill="#6688aa" text-anchor="middle">4 config files</text>

    <!-- ── CONNECTOR LINES ────────────────────── -->
    <!-- include → src -->
    <line x1="210" y1="155" x2="228" y2="155" stroke="#2244aa" stroke-width="1.2" stroke-dasharray="4 2"/>
    <!-- src → tests -->
    <line x1="398" y1="155" x2="416" y2="155" stroke="#884422" stroke-width="1.2" stroke-dasharray="4 2"/>
    <!-- src → root -->
    <line x1="398" y1="190" x2="604" y2="190" stroke="#334455" stroke-width="1" stroke-dasharray="3 3"/>

    <!-- ── BOTTOM SUMMARY ─────────────────────── -->
    <rect x="40" y="342" width="700" height="56" rx="5"
          fill="rgba(10,15,30,0.85)" stroke="#1e3050" stroke-width="1"/>
    <line x1="40" y1="362" x2="740" y2="362" stroke="#1a2a44" stroke-width="0.6"/>

    <!-- stats -->
    <g font-family="monospace" text-anchor="middle">
      <text x="130" y="356" font-size="9" fill="#4477aa">TOTAL FILES</text>
      <text x="130" y="386" font-size="16" font-weight="bold" fill="#88bbff">14</text>

      <line x1="225" y1="348" x2="225" y2="392" stroke="#1e3050" stroke-width="0.8"/>

      <text x="310" y="356" font-size="9" fill="#4477aa">LANGUAGE</text>
      <text x="310" y="386" font-size="13" font-weight="bold" fill="#88bbff">C++17</text>

      <line x1="400" y1="348" x2="400" y2="392" stroke="#1e3050" stroke-width="0.8"/>

      <text x="488" y="356" font-size="9" fill="#44aa66">TEST RESULT</text>
      <text x="488" y="386" font-size="13" font-weight="bold" fill="#66dd44">23 / 23</text>

      <line x1="572" y1="348" x2="572" y2="392" stroke="#1e3050" stroke-width="0.8"/>

      <text x="656" y="356" font-size="9" fill="#cc8844">LICENSE</text>
      <text x="656" y="386" font-size="13" font-weight="bold" fill="#ffaa55">MIT</text>
    </g>

  </g>
</svg>
